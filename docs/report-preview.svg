<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" font-family="Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="1100" height="640" fill="#f3f4f6"/>
  <!-- canvas -->
  <rect x="20" y="20" width="1060" height="600" rx="6" fill="#ffffff" stroke="#e3e6eb"/>

  <text x="44" y="56" fill="#1a2430" font-size="20" font-weight="700">Cascade Field Services: Operations</text>
  <text x="44" y="78" fill="#6b7686" font-size="13">Dec 2025 to May 2026 · built on the semantic model in this repo</text>

  <!-- KPI cards -->
  <g>
    <rect x="44" y="98" width="196" height="92" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
    <text x="60" y="124" fill="#6b7686" font-size="12">Total Revenue</text>
    <text x="60" y="158" fill="#1a2430" font-size="26" font-weight="700">$2.33M</text>
    <rect x="252" y="98" width="196" height="92" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
    <text x="268" y="124" fill="#6b7686" font-size="12">Gross Margin %</text>
    <text x="268" y="158" fill="#1a2430" font-size="26" font-weight="700">43.4%</text>
    <rect x="460" y="98" width="196" height="92" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
    <text x="476" y="124" fill="#6b7686" font-size="12">First-Time-Fix</text>
    <text x="476" y="158" fill="#1a2430" font-size="26" font-weight="700">70.3%</text>
    <rect x="668" y="98" width="196" height="92" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
    <text x="684" y="124" fill="#6b7686" font-size="12">Average Ticket</text>
    <text x="684" y="158" fill="#1a2430" font-size="26" font-weight="700">$1,267</text>
    <rect x="876" y="98" width="160" height="92" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
    <text x="892" y="124" fill="#6b7686" font-size="12">Outstanding AR</text>
    <text x="892" y="158" fill="#1a2430" font-size="24" font-weight="700">$606K</text>
  </g>

  <!-- column chart: revenue by month -->
  <rect x="44" y="210" width="600" height="290" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
  <text x="62" y="238" fill="#1a2430" font-size="14" font-weight="600">Revenue by Month</text>
  <g fill="#118dff">
    <rect x="86" y="350" width="56" height="118" rx="3"/>
    <rect x="172" y="300" width="56" height="168" rx="3"/>
    <rect x="258" y="372" width="56" height="96" rx="3"/>
    <rect x="344" y="384" width="56" height="84" rx="3"/>
    <rect x="430" y="330" width="56" height="138" rx="3"/>
    <rect x="516" y="300" width="56" height="168" rx="3"/>
  </g>
  <g fill="#6b7686" font-size="12" text-anchor="middle">
    <text x="114" y="488">Dec</text><text x="200" y="488">Jan</text><text x="286" y="488">Feb</text>
    <text x="372" y="488">Mar</text><text x="458" y="488">Apr</text><text x="544" y="488">May</text>
  </g>

  <!-- bar chart: revenue by category -->
  <rect x="660" y="210" width="376" height="290" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
  <text x="678" y="238" fill="#1a2430" font-size="14" font-weight="600">Revenue by Category</text>
  <g font-size="12" fill="#5b6675">
    <text x="678" y="282">Install</text>     <rect x="760" y="270" width="250" height="16" rx="3" fill="#118dff"/>
    <text x="678" y="318">Service</text>     <rect x="760" y="306" width="170" height="16" rx="3" fill="#3aa0ff"/>
    <text x="678" y="354">Maintenance</text> <rect x="760" y="342" width="96" height="16" rx="3" fill="#7cc0ff"/>
  </g>

  <!-- table -->
  <rect x="44" y="516" width="992" height="86" rx="8" fill="#fbfcfe" stroke="#e3e6eb"/>
  <g font-size="12">
    <text x="62" y="540" fill="#6b7686">Technician</text>
    <text x="320" y="540" fill="#6b7686">Completed Jobs</text>
    <text x="520" y="540" fill="#6b7686">Revenue</text>
    <text x="720" y="540" fill="#6b7686">First-Time-Fix</text>
    <line x1="62" y1="550" x2="1018" y2="550" stroke="#eef1f5"/>
    <g fill="#1a2430">
      <text x="62" y="572">Harper Sloan</text><text x="320" y="572">128</text><text x="520" y="572">$171,940</text><text x="720" y="572">74.2%</text>
      <text x="62" y="592">Logan Tate</text><text x="320" y="592">121</text><text x="520" y="592">$163,500</text><text x="720" y="592">71.9%</text>
    </g>
  </g>

  <text x="62" y="624" fill="#9aa3b0" font-size="11">Representative report layout. The model, relationships, and DAX are in /model; the numbers are validated in /validation.</text>
</svg>
